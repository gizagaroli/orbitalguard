<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Operadores | OrbitalGuard</title>

    <link rel="icon" type="image/png" href="../assets/images/global/favicon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/reset.css">
    <link rel="stylesheet" href="../assets/css/access.css">
</head>

<body>
    <a href="../index.html" class="back-arrow">
        <i class="fa-solid fa-arrow-left"></i>
    </a>
    <main class="access-page">
        <section class="login-wrapper">
            <a href="../index.html" class="access-logo">
                <span class="logo-icon"></span>
                OrbitalGuard
            </a>

            <div class="login-card">
                <a href="../index.html" class="close-btn" aria-label="Fechar">×</a>

                <p class="status">Acesso restrito</p>

                <h1>Painel Operadores</h1>

                <p class="login-description">
                    Insira suas credenciais para continuar.
                </p>

                <form class="login-form">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="admin@orbitalguard.com">

                    <label for="password">Senha</label>
                    <input type="password" id="password" placeholder="••••••••">

                    <button type="submit">Entrar</button>

                    <p class="login-error"></p>
                </form>
            </div>

            <footer class="access-footer">
                © 2025 OrbitalGuard · Dados: ESA DISCOS · NASA Space-Track · NORAD
            </footer>
        </section>
    </main>

    <script src="../assets/js/access.js"></script>
</body>

</html>
